<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add a new product to NexStore.">
    <title>NexStore | Add Product</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">NexStore</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="add-product.html" class="active">Add Product</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content form-page">
        <div class="form-container">
            <header class="form-header">
                <h1 class="hero-title">Add New Product</h1>
                <p class="hero-subtitle">Fill in the details below to add a new item to the store catalog.</p>
            </header>

            <form id="add-product-form" class="styled-form">
                <div id="message-container" class="message-container"></div>

                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g. Wireless Headphones" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price (₹)</label>
                        <input type="number" id="price" name="price" step="0.01" min="0.01" placeholder="e.g. 149.99" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="" disabled selected>Select a category</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Clothing">Clothing</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" placeholder="Briefly describe the product..." required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">
                    <span>Add Product</span>
                </button>
            </form>
        </div>
    </main>

    <!-- Scripts -->
    <script src="add-product.js"></script>
</body>
</html>
